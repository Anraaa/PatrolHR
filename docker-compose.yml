version: '3'
services:
  sample:
    build: ./php
    image: sample_php:latest
    container_name: sample
    hostname: "sample"
    ports:
      - "5173:5173"
      - "8000:8000"
    volumes:
      - ./src:/var/www/html
      - ./php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    working_dir: /var/www/html
    environment:
      - VITE_HMR_HOST=localhost
      - VITE_HMR_PORT=5173
    depends_on:
      - db_sample
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app_network
  db_sample:
    image: mariadb:10.11
    container_name: db_sample
    restart: unless-stopped
    tty: true
    ports:
      - "13306:3306"
    volumes:
      - ./db/data:/var/lib/mysql
      - ./db/conf.d:/etc/mysql/conf.d:ro
    environment:
      MYSQL_USER: anraaa
      MYSQL_PASSWORD: p455w0rd1!.
      MYSQL_ROOT_PASSWORD: p455w0rd
      TZ: Asia/Jakarta
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql_sample
    networks:
      - app_network
  nginx_sample:
    build: ./nginx
    image: nginx_sample:latest
    container_name: nginx_sample
    hostname: "nginx_sample"
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - sample
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
